<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학생 자리 배치</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue-light: #d6eaf8;
      --blue-soft: #8ec5e8;
      --blue-main: #5a9fc9;
      --green-light: #dff3e8;
      --green-soft: #9fd4b5;
      --green-main: #6aab87;
      --bg-top: #eef7f4;
      --bg-bottom: #e8f2fa;
      --card-bg: #ffffff;
      --text-main: #2e4a55;
      --text-sub: #5f7d88;
      --text-muted: #8aa3ad;
      --border-soft: #cce4dc;
      --shadow-soft: 0 2px 12px rgba(90, 159, 201, 0.1);
      --radius-card: 14px;
      --radius-seat: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      background-attachment: fixed;
      color: var(--text-main);
      line-height: 1.65;
      letter-spacing: -0.01em;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .layout {
      max-width: 720px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 상단: 명단 + 버튼 */
    .top-panel {
      flex-shrink: 0;
      padding: 1rem 1rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* 하단: 좌석표 (스크롤 영역) */
    .seat-panel {
      flex: 1;
      padding: 0 1rem 1.5rem;
    }

    /* 카드 공통 */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius-card);
      border: 1px solid rgba(142, 197, 232, 0.25);
      box-shadow: var(--shadow-soft);
      padding: 1.25rem;
    }

    .card-title {
      font-size: 1.0625rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--text-main);
      padding-left: 0.625rem;
      border-left: 3px solid var(--green-soft);
    }

    /* 헤더 */
    header.card {
      text-align: center;
      background: linear-gradient(135deg, #f8fcfb 0%, #f3f9fd 100%);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--blue-main);
    }

    header p {
      font-size: 0.875rem;
      color: var(--text-sub);
      margin-top: 0.375rem;
    }

    /* 명단 입력 */
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text-sub);
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 0.75rem;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-seat);
      font-size: 0.9375rem;
      font-family: inherit;
      line-height: 1.7;
      color: var(--text-main);
      background: #fafdfc;
      resize: vertical;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    textarea:focus {
      outline: none;
      border-color: var(--blue-soft);
      box-shadow: 0 0 0 3px rgba(142, 197, 232, 0.25);
      background: #fff;
    }

    .hint {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    /* 가상 데이터 안내 */
    .sample-notice {
      font-size: 0.8125rem;
      color: var(--text-sub);
      background: var(--blue-light);
      border: 1px solid rgba(142, 197, 232, 0.5);
      border-radius: var(--radius-seat);
      padding: 0.625rem 0.75rem;
      margin-bottom: 0.75rem;
      line-height: 1.55;
    }

    .sample-notice strong {
      color: var(--blue-main);
      font-weight: 600;
    }

    /* 버튼 영역 */
    .btn-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.875rem;
    }

    .btn-random {
      flex: 1;
      margin-top: 0;
      padding: 0.875rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.02em;
      color: #fff;
      background: linear-gradient(135deg, var(--blue-main) 0%, var(--green-main) 100%);
      border: none;
      border-radius: var(--radius-seat);
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(90, 159, 201, 0.25);
      transition: opacity 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
    }

    .btn-random:hover {
      opacity: 0.92;
      box-shadow: 0 4px 14px rgba(90, 159, 201, 0.32);
    }

    .btn-random:active {
      transform: scale(0.98);
      box-shadow: 0 2px 6px rgba(90, 159, 201, 0.2);
    }

    .btn-reset {
      flex-shrink: 0;
      padding: 0.875rem 1rem;
      font-size: 0.9375rem;
      font-weight: 500;
      font-family: inherit;
      color: var(--text-sub);
      background: #fff;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-seat);
      cursor: pointer;
      transition: background 0.25s ease, border-color 0.25s ease;
    }

    .btn-reset:hover {
      background: var(--green-light);
      border-color: var(--green-soft);
    }

    .btn-reset:active {
      transform: scale(0.98);
    }

    /* 인쇄용 (화면에서는 숨김) */
    .print-only {
      display: none;
    }

    /* 칠판 표시 */
    .board-label {
      text-align: center;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-sub);
      margin-bottom: 0.75rem;
      padding: 0.5rem;
      background: linear-gradient(90deg, var(--green-light) 0%, var(--blue-light) 100%);
      border-radius: var(--radius-seat);
    }

    /* 4×3 좌석 그리드 */
    .seat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.625rem;
    }

    .seat {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--green-light);
      border: 1.5px dashed var(--border-soft);
      border-radius: var(--radius-seat);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
      text-align: center;
      padding: 0.25rem;
      word-break: keep-all;
      overflow: hidden;
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }

    .seat.filled {
      background: linear-gradient(145deg, var(--blue-light) 0%, var(--green-light) 100%);
      border: 1.5px solid var(--blue-soft);
      color: var(--text-main);
      font-weight: 600;
    }

    /* 배치 시 살짝 나타나는 효과 */
    @keyframes seatFadeIn {
      from {
        opacity: 0.4;
        transform: scale(0.97);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .seat.appear {
      animation: seatFadeIn 0.35s ease-out both;
    }

    /* 인쇄 */
    @media print {
      @page {
        margin: 1.5cm;
      }

      body {
        background: #fff;
        color: #000;
        font-size: 12pt;
      }

      .top-panel,
      .btn-row,
      .hint,
      .sample-notice {
        display: none !important;
      }

      .layout {
        max-width: none;
      }

      .seat-panel {
        padding: 0;
      }

      .card {
        border: none;
        box-shadow: none;
        padding: 0;
      }

      .card-title {
        font-size: 14pt;
        border-left-color: #666;
        margin-bottom: 0.5rem;
      }

      .print-only {
        display: block;
        text-align: center;
        margin-bottom: 1rem;
      }

      .print-only h2 {
        font-size: 16pt;
        font-weight: 700;
        margin-bottom: 0.25rem;
      }

      .print-only p {
        font-size: 10pt;
        color: #555;
      }

      .board-label {
        background: #eee;
        color: #333;
        border: 1px solid #ccc;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .seat-grid {
        gap: 0.5rem;
      }

      .seat {
        background: #fff !important;
        border: 1.5px solid #333 !important;
        color: #000 !important;
        font-size: 11pt;
        font-weight: 600;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .seat.filled {
        background: #f5f5f5 !important;
      }

      .seat.appear {
        animation: none;
      }
    }

    /* 모바일 */
    @media (max-width: 480px) {
      .top-panel {
        padding: 0.75rem 0.75rem 0.5rem;
      }

      .seat-panel {
        padding: 0 0.75rem 2rem;
      }

      header h1 {
        font-size: 1.25rem;
      }

      textarea {
        min-height: 100px;
      }

      .seat-grid {
        gap: 0.375rem;
      }

      .seat {
        font-size: 0.6875rem;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- 상단: 명단 + 버튼 -->
    <div class="top-panel">
      <header class="card">
        <h1>학생 자리 배치</h1>
        <p>명단을 입력하고 랜덤 배치 버튼을 눌러 보세요.</p>
      </header>

      <section class="card">
        <h2 class="card-title">학생 명단</h2>
        <p class="sample-notice">아래 명단은 <strong>예시(가상) 데이터</strong>입니다. 실제 학생 이름으로 바꿔 주세요.</p>
        <label for="nameList">이름 입력 (한 줄에 한 명)</label>
        <textarea id="nameList">김민수
이서연
박준호
최유나
정도현
한소희
윤태양
임채원
강민재
조하은
오시우
배지민</textarea>
        <p class="hint">최대 12명까지 배치할 수 있습니다. (4열 × 3행)</p>
        <div class="btn-row">
          <button type="button" class="btn-random" id="btnRandom">랜덤 배치</button>
          <button type="button" class="btn-reset" id="btnReset">초기화</button>
        </div>
      </section>
    </div>

    <!-- 하단: 좌석표 -->
    <div class="seat-panel">
      <section class="card">
        <div class="print-only">
          <h2>학생 자리 배치표</h2>
          <p id="printDate"></p>
        </div>
        <h2 class="card-title">좌석 배치</h2>
        <div class="board-label">↑ 칠판</div>
        <div class="seat-grid" id="seatGrid"></div>
      </section>
    </div>
  </div>

  <script>
    const COLS = 4;
    const ROWS = 3;
    const TOTAL_SEATS = COLS * ROWS;

    const nameListEl = document.getElementById("nameList");
    const btnRandomEl = document.getElementById("btnRandom");
    const btnResetEl = document.getElementById("btnReset");
    const seatGridEl = document.getElementById("seatGrid");
    const printDateEl = document.getElementById("printDate");

    // 4×3 빈 좌석 그리드 만들기
    function createSeatGrid() {
      seatGridEl.innerHTML = "";
      for (let i = 0; i < TOTAL_SEATS; i++) {
        const seat = document.createElement("div");
        seat.className = "seat";
        seat.textContent = "";
        seat.dataset.index = i;
        seat.setAttribute("aria-label", `${i + 1}번 빈 좌석`);
        seatGridEl.appendChild(seat);
      }
    }

    // textarea에서 이름 목록 읽기
    function getNames() {
      return nameListEl.value
        .split("\n")
        .map((name) => name.trim())
        .filter((name) => name.length > 0);
    }

    // 배열 순서 섞기 (피셔-예이츠)
    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    // 랜덤 배치 / 다시 배치
    function assignSeats() {
      const names = getNames();
      if (names.length === 0) {
        alert("학생 이름을 한 줄에 한 명씩 입력해 주세요.");
        return;
      }

      const shuffled = shuffle(names.slice(0, TOTAL_SEATS));
      const seats = seatGridEl.querySelectorAll(".seat");

      seats.forEach((seat, i) => {
        seat.classList.remove("appear", "filled");
        seat.style.animationDelay = "";

        if (shuffled[i]) {
          seat.textContent = shuffled[i];
          seat.classList.add("filled");
          seat.setAttribute("aria-label", `${i + 1}번 ${shuffled[i]}`);
          seat.style.animationDelay = `${i * 0.04}s`;
          void seat.offsetWidth;
          seat.classList.add("appear");
        } else {
          seat.textContent = "";
          seat.setAttribute("aria-label", `${i + 1}번 빈 좌석`);
        }
      });

      btnRandomEl.textContent = "다시 배치";
    }

    // 좌석·버튼 초기화
    function resetSeats() {
      const seats = seatGridEl.querySelectorAll(".seat");

      seats.forEach((seat, i) => {
        seat.textContent = "";
        seat.classList.remove("appear", "filled");
        seat.style.animationDelay = "";
        seat.setAttribute("aria-label", `${i + 1}번 빈 좌석`);
      });

      btnRandomEl.textContent = "랜덤 배치";
    }

    // 인쇄 날짜 표시
    function setPrintDate() {
      const now = new Date();
      printDateEl.textContent = now.toLocaleDateString("ko-KR", {
        year: "numeric",
        month: "long",
        day: "numeric",
      });
    }

    btnRandomEl.addEventListener("click", assignSeats);
    btnResetEl.addEventListener("click", resetSeats);
    window.addEventListener("beforeprint", setPrintDate);
    createSeatGrid();
  </script>
</body>
</html>
